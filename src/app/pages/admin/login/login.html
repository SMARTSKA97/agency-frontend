<section class="login-page">
  <div class="login-panel glass-panel">
    <div class="login-copy">
      <span class="section-label">Admin access</span>
      <h1 class="section-title">A cleaner control room for running the agency.</h1>
      <p class="supporting-copy">
        Sign in to manage client records, shape invoices, and keep the back office consistent with the public brand.
      </p>
    </div>

    <p-card styleClass="login-card">
      <div class="toolbar-title">
        <small>Welcome back</small>
        <h2>Sign in</h2>
      </div>

      <div class="login-form">
        <div class="field-block">
          <label for="email">Email</label>
          <input id="email" type="text" pInputText [(ngModel)]="credentials.email" />
        </div>

        <div class="field-block">
          <label for="password">Password</label>
          <p-password
            id="password"
            [toggleMask]="true"
            styleClass="w-full"
            inputStyleClass="w-full"
            [(ngModel)]="credentials.password"
            [feedback]="false"
          ></p-password>
        </div>

        <p-button label="Sign in" icon="pi pi-arrow-right" styleClass="w-full" (onClick)="onLogin()"></p-button>
      </div>
    </p-card>
  </div>
</section>
