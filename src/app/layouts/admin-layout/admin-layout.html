<div class="admin-shell">
  <aside class="admin-sidebar glass-panel">
    <a class="brand-mark admin-brand" routerLink="/">
      <span class="brand-mark__dot"></span>
      <div>
        <span>SKA97</span>
        <small>Admin Studio</small>
      </div>
    </a>

    <nav class="admin-nav">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.routerLink"
        routerLinkActive="is-active"
        class="admin-nav__link"
      >
        <i [class]="item.icon"></i>
        <span>{{ item.label }}</span>
      </a>
    </nav>

    <div class="admin-sidebar__footer">
      <div class="toolbar-title">
        <small>Workspace Look</small>
        <p>Switch the palette or flip to dark mode without changing the layout.</p>
      </div>
      <p-select
        [options]="themeService.themeOptions()"
        [ngModel]="themeService.themeId()"
        (ngModelChange)="themeService.setTheme($event)"
        optionLabel="label"
        optionValue="value"
        appendTo="body"
      ></p-select>
      <p-button
        [label]="themeService.mode() === 'dark' ? 'Light mode' : 'Dark mode'"
        [icon]="themeService.mode() === 'dark' ? 'pi pi-sun' : 'pi pi-moon'"
        (onClick)="themeService.toggleMode()"
      ></p-button>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-header glass-panel">
      <div class="toolbar-title">
        <small>Operations</small>
        <h2>Minimal workspace for clients, quotes, and invoices.</h2>
      </div>

      <div class="admin-header__actions">
        <p-avatar icon="pi pi-bell" styleClass="admin-avatar-chip" shape="circle"></p-avatar>

        <div class="admin-user">
          <p-avatar image="assets/profile-placeholder.jpg" size="large" shape="circle"></p-avatar>
          <div>
            <strong>Admin User</strong>
            <small>owner</small>
          </div>
        </div>

        <p-button icon="pi pi-sign-out" [text]="true" severity="danger" (onClick)="logout()"></p-button>
      </div>
    </header>

    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
